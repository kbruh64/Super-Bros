<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Bros - Platform Fighter</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #1a1a2e;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        #game-container {
            border: 4px solid #e94560;
            border-radius: 8px;
            box-shadow: 0 0 30px rgba(233, 69, 96, 0.3);
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-size: 24px;
            text-align: center;
        }

        .controls-info {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #888;
            font-size: 12px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div id="game-container"></div>
    <div id="loading">Loading Super Bros...</div>
    <script>
        // Fallback: if the game fails to initialize, hide the loading text
        // and show an error message so the page doesn't stay stuck.
        (function(){
            const loadingEl = document.getElementById('loading');
            function showError(msg){
                if(!loadingEl) return;
                loadingEl.style.display = 'block';
                loadingEl.style.color = '#ff6b6b';
                loadingEl.textContent = msg || 'Failed to start the game — check console.';
            }

            window.addEventListener('error', function(ev){
                showError('Error initializing game — check browser console.');
            });
            window.addEventListener('unhandledrejection', function(ev){
                showError('Unhandled promise rejection — check browser console.');
            });

            // If BootScene doesn't hide the loading element within 8s, show guidance.
            setTimeout(function(){
                if(loadingEl && loadingEl.style.display !== 'none'){
                        showError('Game still loading — open dev tools console for errors.');
                        // Also capture console errors and show them to help debugging
                        const details = document.createElement('pre');
                        details.id = 'error-details';
                        details.style.position = 'absolute';
                        details.style.bottom = '40px';
                        details.style.left = '50%';
                        details.style.transform = 'translateX(-50%)';
                        details.style.maxWidth = '80%';
                        details.style.maxHeight = '30%';
                        details.style.overflow = 'auto';
                        details.style.background = 'rgba(0,0,0,0.4)';
                        details.style.color = '#fff';
                        details.style.padding = '12px';
                        details.style.borderRadius = '6px';
                        details.style.fontSize = '12px';
                        details.style.whiteSpace = 'pre-wrap';
                        document.body.appendChild(details);
                        const appendDetails = (msg) => {
                            if(!details) return;
                            details.textContent += '\n' + msg;
                        };
                        const origConsoleError = console.error.bind(console);
                        console.error = function(...args){
                            appendDetails(args.map(a=>typeof a==='object'?JSON.stringify(a,null,2):String(a)).join(' '));
                            origConsoleError(...args);
                        };
                        window.addEventListener('error', function(ev){
                            appendDetails((ev && ev.message) ? ev.message + '\n' + (ev.error && ev.error.stack ? ev.error.stack : '') : String(ev));
                        });
                        window.addEventListener('unhandledrejection', function(ev){
                            appendDetails('UnhandledRejection: ' + (ev && ev.reason ? (ev.reason.stack || ev.reason) : String(ev)));
                        });
                }
            }, 8000);
        })();
    </script>
    <div class="controls-info">
        P1: WASD + F/Shift(attack) + E/RightCtrl(special) | P2: Arrows + F/Shift(attack) + E/RightCtrl(special) | ESC: Pause
    </div>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="js/constants.js"></script>
    <script src="js/characters.js"></script>
    <script src="js/arenas.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/scenes/BootScene.js"></script>
    <script src="js/scenes/MenuScene.js"></script>
    <script src="js/scenes/CharacterSelectScene.js"></script>
    <script src="js/scenes/StageSelectScene.js"></script>
    <script src="js/scenes/GameScene.js"></script>
    <script src="js/scenes/PauseScene.js"></script>
    <script src="js/scenes/VictoryScene.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
