<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Super Bros - Platform Fighter</title>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        #game-container {
            background: #2a2a4e !important;
            border: 4px solid #00ffff;
            border-radius: 8px;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.6), 0 0 80px rgba(255, 0, 255, 0.3);
            animation: containerGlow 3s ease-in-out infinite;
        }

        @keyframes containerGlow {
            0%, 100% { box-shadow: 0 0 40px rgba(0, 255, 255, 0.6), 0 0 80px rgba(255, 0, 255, 0.3); }
            50% { box-shadow: 0 0 60px rgba(0, 255, 255, 0.8), 0 0 100px rgba(255, 0, 255, 0.5); }
        }

        #game-container canvas {
            display: block;
            background: #2a2a4e !important;
        }

        #loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ffff;
            font-size: 28px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.8), 0 0 40px rgba(255, 0, 255, 0.5);
            animation: loadingPulse 2s ease-in-out infinite;
        }

        @keyframes loadingPulse {
            0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.8; }
        }

        .controls-info {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #00ffff;
            font-size: 13px;
            font-weight: bold;
            text-align: center;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            background: rgba(0, 0, 0, 0.5);
            padding: 8px 16px;
            border-radius: 20px;
            border: 2px solid rgba(0, 255, 255, 0.3);
        }

        /* ── Theme Switcher UI ── */
        .theme-switcher {
            position: fixed;
            top: 10px;
            right: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(0, 0, 0, 0.55);
            padding: 6px 12px;
            border-radius: 20px;
            border: 2px solid rgba(0, 255, 255, 0.3);
            z-index: 1000;
        }

        .theme-switcher label {
            color: #00ffff;
            font-size: 12px;
            font-weight: bold;
            text-shadow: 0 0 8px rgba(0, 255, 255, 0.7);
            white-space: nowrap;
        }

        .theme-switcher select {
            background: rgba(0, 0, 0, 0.7);
            color: #00ffff;
            border: 1px solid rgba(0, 255, 255, 0.5);
            border-radius: 8px;
            padding: 3px 6px;
            font-size: 12px;
            font-family: inherit;
            cursor: pointer;
            outline: none;
        }

        .theme-switcher select:hover {
            border-color: #00ffff;
        }

        /* ── DARK (Matrix) theme ── */
        body.dark-theme {
            background: linear-gradient(135deg, #050505 0%, #0d1117 50%, #1a2332 100%) !important;
            animation: none !important;
        }
        body.dark-theme #game-container {
            border-color: #00ff41 !important;
            box-shadow: 0 0 40px rgba(0, 255, 65, 0.5), 0 0 80px rgba(0, 200, 40, 0.25) !important;
            animation: none !important;
        }
        body.dark-theme .controls-info {
            color: #00ff41;
            text-shadow: 0 0 10px rgba(0, 255, 65, 0.8);
            border-color: rgba(0, 255, 65, 0.3);
        }
        body.dark-theme #loading {
            color: #00ff41;
            text-shadow: 0 0 20px rgba(0, 255, 65, 0.8), 0 0 40px rgba(0, 180, 30, 0.5);
        }
        body.dark-theme .theme-switcher {
            border-color: rgba(0, 255, 65, 0.3);
        }
        body.dark-theme .theme-switcher label {
            color: #00ff41;
            text-shadow: 0 0 8px rgba(0, 255, 65, 0.7);
        }
        body.dark-theme .theme-switcher select {
            color: #00ff41;
            border-color: rgba(0, 255, 65, 0.5);
        }

        /* ── FIRE theme ── */
        body.fire-theme {
            background: linear-gradient(135deg, #1a0000 0%, #5c1100 50%, #cc3300 100%) !important;
            animation: none !important;
        }
        body.fire-theme #game-container {
            border-color: #ff6600 !important;
            box-shadow: 0 0 40px rgba(255, 80, 0, 0.6), 0 0 80px rgba(255, 30, 0, 0.3) !important;
            animation: none !important;
        }
        body.fire-theme .controls-info {
            color: #ffaa00;
            text-shadow: 0 0 10px rgba(255, 140, 0, 0.8);
            border-color: rgba(255, 100, 0, 0.4);
        }
        body.fire-theme #loading {
            color: #ff8800;
            text-shadow: 0 0 20px rgba(255, 100, 0, 0.8), 0 0 40px rgba(255, 30, 0, 0.5);
        }
        body.fire-theme .theme-switcher {
            border-color: rgba(255, 100, 0, 0.4);
        }
        body.fire-theme .theme-switcher label {
            color: #ffaa00;
            text-shadow: 0 0 8px rgba(255, 140, 0, 0.7);
        }
        body.fire-theme .theme-switcher select {
            color: #ffaa00;
            border-color: rgba(255, 100, 0, 0.5);
        }

        /* ── OCEAN theme ── */
        body.ocean-theme {
            background: linear-gradient(135deg, #000d1a 0%, #003366 50%, #005580 100%) !important;
            animation: none !important;
        }
        body.ocean-theme #game-container {
            border-color: #00ccff !important;
            box-shadow: 0 0 40px rgba(0, 180, 255, 0.5), 0 0 80px rgba(0, 100, 200, 0.3) !important;
            animation: none !important;
        }
        body.ocean-theme .controls-info {
            color: #00d4ff;
            text-shadow: 0 0 10px rgba(0, 200, 255, 0.8);
            border-color: rgba(0, 180, 255, 0.35);
        }
        body.ocean-theme #loading {
            color: #00d4ff;
            text-shadow: 0 0 20px rgba(0, 200, 255, 0.8), 0 0 40px rgba(0, 100, 200, 0.5);
        }
        body.ocean-theme .theme-switcher {
            border-color: rgba(0, 180, 255, 0.35);
        }
        body.ocean-theme .theme-switcher label {
            color: #00d4ff;
            text-shadow: 0 0 8px rgba(0, 200, 255, 0.7);
        }
        body.ocean-theme .theme-switcher select {
            color: #00d4ff;
            border-color: rgba(0, 180, 255, 0.5);
        }

        /* ── RETRO (Arcade) theme ── */
        body.retro-theme {
            background: linear-gradient(135deg, #08000f 0%, #1a0028 50%, #2e0050 100%) !important;
            animation: none !important;
        }
        body.retro-theme #game-container {
            border-color: #ffdd00 !important;
            box-shadow: 0 0 40px rgba(255, 220, 0, 0.5), 0 0 80px rgba(255, 140, 0, 0.25) !important;
            animation: none !important;
        }
        body.retro-theme .controls-info {
            color: #ffdd00;
            text-shadow: 0 0 10px rgba(255, 220, 0, 0.8);
            border-color: rgba(255, 200, 0, 0.35);
        }
        body.retro-theme #loading {
            color: #ffdd00;
            text-shadow: 0 0 20px rgba(255, 220, 0, 0.8), 0 0 40px rgba(255, 140, 0, 0.5);
        }
        body.retro-theme .theme-switcher {
            border-color: rgba(255, 200, 0, 0.35);
        }
        body.retro-theme .theme-switcher label {
            color: #ffdd00;
            text-shadow: 0 0 8px rgba(255, 220, 0, 0.7);
        }
        body.retro-theme .theme-switcher select {
            color: #ffdd00;
            border-color: rgba(255, 200, 0, 0.5);
        }
    </style>
</head>
<body>
    <div class="theme-switcher">
        <label for="theme-select">Theme:</label>
        <select id="theme-select">
            <option value="">Cyberpunk</option>
            <option value="dark-theme">Dark (Matrix)</option>
            <option value="fire-theme">Fire</option>
            <option value="ocean-theme">Ocean</option>
            <option value="retro-theme">Retro</option>
        </select>
    </div>

    <div id="game-container"></div>
    <div id="loading">Loading Super Bros...</div>
    <div class="controls-info">
        P1: WASD + F/Shift(attack) + E/RightCtrl(special) | P2: IJKL + U/O(attack) + H/Y(special) | ESC: Pause
    </div>

    <script>
        // Theme switcher — runs before game scripts so the theme is applied immediately
        (function () {
            var select = document.getElementById('theme-select');
            var saved = localStorage.getItem('super-bros-theme') || '';

            // Apply saved theme right away (no flash of unstyled content)
            document.body.className = saved;
            select.value = saved;

            select.addEventListener('change', function () {
                document.body.className = select.value;
                localStorage.setItem('super-bros-theme', select.value);
            });
        })();
    </script>

    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="js/constants.js"></script>
    <script src="js/characters.js"></script>
    <script src="js/arenas.js"></script>
    <script src="js/ai.js"></script>
    <script src="js/scenes/BootScene.js"></script>
    <script src="js/scenes/MenuScene.js"></script>
    <script src="js/scenes/CharacterSelectScene.js"></script>
    <script src="js/scenes/StageSelectScene.js"></script>
    <script src="js/scenes/GameScene.js"></script>
    <script src="js/scenes/PauseScene.js"></script>
    <script src="js/scenes/VictoryScene.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
